<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Market Replay Simulator</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root {
            --bg-dark: #0f1115; --header-bg: #181b21; --card-bg: #1e1e1e;
            --accent-blue: #2962ff; --accent-yellow: #ffc107;
            --accent-green: #00c853; --accent-red: #ff1744;
            --text-primary: #ffffff; --text-secondary: #909399;
            --border-color: #333;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text-primary); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* 1. TOP BAR */
        .top-bar { display: flex; align-items: center; justify-content: space-between; background: var(--header-bg); padding: 10px 20px; border-bottom: 1px solid var(--border-color); }
        .logo { font-weight: 900; font-size: 18px; color: var(--text-primary); display: flex; gap: 5px; }
        .logo span { color: var(--accent-yellow); }
        
        .controls { display: flex; gap: 15px; align-items: center; }
        select, input[type="date"], button { background: var(--card-bg); color: var(--text-primary); border: 1px solid var(--border-color); padding: 6px 12px; border-radius: 4px; font-size: 13px; outline: none; }
        button { cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-load { background: var(--accent-blue); border-color: var(--accent-blue); }
        .btn-load:hover { filter: brightness(1.2); }
        
        .stats { display: flex; gap: 20px; font-family: monospace; font-size: 14px; }
        .stat-val { font-weight: bold; }
        .text-green { color: var(--accent-green); }
        .text-red { color: var(--accent-red); }

        /* 2. PLAYER BAR */
        .player-bar { display: flex; align-items: center; gap: 15px; padding: 10px 20px; background: #13151a; border-bottom: 1px solid var(--border-color); }
        .play-btn { background: var(--accent-green); color: black; border: none; border-radius: 50%; width: 35px; height: 35px; font-size: 16px; display: flex; align-items: center; justify-content: center; }
        .stop-btn { background: var(--accent-red); color: white; border: none; border-radius: 4px; width: 35px; height: 35px; }
        .step-btn { background: transparent; color: var(--text-secondary); border: 1px solid var(--border-color); }
        
        .timeline-container { flex-grow: 1; display: flex; align-items: center; gap: 10px; position: relative; }
        
        /* नया टूलटिप डिज़ाइन */
        #slider-tooltip {
            position: absolute;
            top: -22px; /* स्लाइडर के ठीक ऊपर */
            background: var(--accent-blue);
            color: white;
            padding: 3px 6px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            pointer-events: none; /* माउस को डिस्टर्ब न करे */
            display: none;
            transform: translateX(-50%);
            white-space: nowrap;
            z-index: 100;
        }
        input[type="range"] { width: 100%; cursor: pointer; accent-color: var(--accent-blue); }
        
        /* 3. MAIN LAYOUT */
        .main-content { display: flex; flex-grow: 1; overflow: hidden; }
        
        /* LEFT: Option Chain */
        .left-panel { width: 55%; border-right: 1px solid var(--border-color); display: flex; flex-direction: column; }
        .sr-header { display: flex; justify-content: space-between; padding: 10px; background: var(--header-bg); border-bottom: 1px solid var(--border-color); font-size: 12px; font-weight: bold; }
        .oc-container { flex-grow: 1; overflow-y: auto; padding: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; text-align: center; }
        th, td { border: 1px solid #333; padding: 4px; }
        th { background: #000066; position: sticky; top: 0; }
        .spot-row td { border-top: 2px solid var(--accent-red); }

        
        /* RIGHT: Chart */
        .right-panel { width: 45%; display: flex; flex-direction: column; }
        .chart-container { flex-grow: 1; position: relative; }
        #chart { width: 100%; height: 100%; }
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 1000; flex-direction: column; gap: 15px;}
        .hourglass { font-size: 40px; animation: spin 2s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Color Coding Styles */
        .bg-green { background-color: #1b5e20 !important; color: #fff !important; }
        .bg-red   { background-color: #b71c1c !important; color: #fff !important; }
        .bg-yellow { background-color: #fbc02d !important; color: #000 !important; }
        .pct-text { font-size: 10px; font-weight: normal; opacity: 0.7; display: block; margin-top: 2px;}
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="logo">Market <span>Replay</span></div>
        <div class="controls">
            <select id="sim-symbol">
                <option value="NIFTY">NIFTY</option>
                <option value="BANKNIFTY">BANKNIFTY</option>
            </select>
            <input type="date" id="sim-date">
            <select id="candle-interval" onchange="rebuildCandles()" title="Candle Interval">
                <option value="1">1 Min</option>
                <option value="2">2 Min</option>
                <option value="3">3 Min</option>
                <option value="5" selected>5 Min</option>
                <option value="10">10 Min</option>
                <option value="15">15 Min</option>
                <option value="60">1 Hour</option>
            </select>
            <button class="btn-load" onclick="loadReplayData()">⬇ Load Data</button>
        </div>
        <div class="stats">
            <div>SPOT: <span id="stat-spot" class="stat-val text-green">—</span></div>
            <div>TIME: <span id="stat-time" class="stat-val text-yellow">—</span></div>
            <a href="{% url 'admin_panel' %}" style="color:var(--text-secondary); text-decoration:none;">← Live Dashboard</a>
        </div>
    </div>

    <div class="player-bar">
        <button class="play-btn" id="btn-play" onclick="togglePlay()">▶</button>
        <button class="stop-btn" onclick="resetReplay()">◼</button>
        <button class="step-btn" onclick="stepBackward()">← -1</button>
        <button class="step-btn" onclick="stepForward()">+1 →</button>
        
        <select id="sim-speed" onchange="changeSpeed()">
            <option value="1000">Speed: 1x</option>
            <option value="500">Speed: 2x</option>
            <option value="200">Speed: 5x</option>
            <option value="50">Speed: MAX</option>
        </select>
        
        <div class="timeline-container">
            <div id="slider-tooltip">09:15:00</div>
            
            <input type="range" id="timeline-slider" min="0" max="100" value="0" oninput="seekTimeline(this.value)" disabled>
            <span style="font-size: 11px; color: var(--text-secondary);" id="timeline-lbl">IDLE</span>
        </div>
    </div>

    <div class="main-content">
        
        <div class="left-panel">
            <div class="sr-header">
                <div style="color:var(--accent-red)">R: <span id="sr-res-val">—</span> [<span id="sr-res-stat">—</span>]</div>
                <div style="color:var(--accent-green)">S: <span id="sr-sup-val">—</span> [<span id="sr-sup-stat">—</span>]</div>
            </div>
            <div class="oc-container" id="oc-table-div">
                <div style="text-align:center; margin-top: 20%; color: var(--text-secondary);">
                    ⏳ Please select a Date and click Load
                </div>
            </div>
        </div>

        <div class="right-panel">
            <div class="chart-container">
                <div id="chart"></div>
            </div>
        </div>

    </div>

    <div id="loading-overlay">
        <div class="hourglass">⏳</div>
        <div>Fetching Historical Data from Database & Upstox...</div>
    </div>

    <script>
        let replayData = null;
        let timelineIndex = 0;
        let isPlaying = false;
        let playInterval = null;

        let rawCandlesData  = [];  // Upstox से आई 1-min raw candles
        let allCandlesData  = [];  // interval के हिसाब से aggregated candles
        let userScrolled    = false; // user ने manually scroll किया है?

        // ── Candle Aggregation Function ──────────────────────────────────
        function aggregateCandles(rawCandles, intervalMin) {
            if (!rawCandles || rawCandles.length === 0) return [];
            if (intervalMin <= 1) return rawCandles; // 1 min → no change

            const intervalSec = intervalMin * 60;
            const buckets = {};

            rawCandles.forEach(c => {
                // Bucket start time: interval के शुरू में snap
                const bucketTime = Math.floor(c.time / intervalSec) * intervalSec;

                if (!buckets[bucketTime]) {
                    buckets[bucketTime] = {
                        time:    bucketTime,
                        timeStr: new Date((bucketTime - 19800) * 1000)
                                    .toLocaleTimeString('en-GB', { hour12: false, timeZone: 'Asia/Kolkata' }),
                        open:  c.open,
                        high:  c.high,
                        low:   c.low,
                        close: c.close,
                    };
                } else {
                    const b = buckets[bucketTime];
                    b.high  = Math.max(b.high, c.high);
                    b.low   = Math.min(b.low,  c.low);
                    b.close = c.close; // last tick का close
                }
            });

            return Object.values(buckets).sort((a, b) => a.time - b.time);
        }

        // ── Last candle हमेशा visible रखो (right margin के साथ) ────────
        function showLastCandle() {
            if (userScrolled) return;  // ✅ user ने scroll किया है — मत हिलाओ
            const barsCount = allCandlesData.length;
            if (barsCount === 0) return;
            _chartUpdating = true;
            mainChart.timeScale().scrollToPosition(-5, false);
            setTimeout(() => { _chartUpdating = false; }, 50);
        }

        // Double-click पर auto-follow फिर से ON करो
        function resetChartFollow() {
            userScrolled = false;
            showLastCandle();
        }

        // ── Interval बदलने पर candles rebuild करो ──────────────────────
        function rebuildCandles() {
            const intervalMin = parseInt(document.getElementById('candle-interval').value) || 1;
            allCandlesData = aggregateCandles(rawCandlesData, intervalMin);

            // अगर replay चल रहा है तो current frame पर re-render
            if (replayData && replayData.timeline.length > 0) {
                const timeStr = replayData.timeline[timelineIndex];
                let visibleCandles = allCandlesData.filter(c => c.timeStr <= timeStr);
                if (visibleCandles.length > 0) {
                    candleSeries.setData(visibleCandles);
                    showLastCandle();
                }
            }
        }
        let ceReversalLine = null;
        let peReversalLine = null;
        
        let mainChart = null;
        let candleSeries = null;
        let reversalLines = [];
       

        // 1. CHART INITIALIZATION
        function initChart() {
            const chartDiv = document.getElementById('chart');
            mainChart = LightweightCharts.createChart(chartDiv, {
                width: chartDiv.clientWidth,
                height: chartDiv.clientHeight,
                layout: { background: { color: "#0f1115" }, textColor: "#8b949e" },
                grid: { vertLines: { color: "#21262d" }, horzLines: { color: "#21262d" } },
                timeScale: { timeVisible: true, secondsVisible: false },
            });
            candleSeries = mainChart.addCandlestickSeries({
                upColor: "#00c853", downColor: "#ff1744", borderVisible: false
            });
            
            new ResizeObserver(() => {
                mainChart.applyOptions({ width: chartDiv.clientWidth, height: chartDiv.clientHeight });
            }).observe(chartDiv);

            // ✅ User ने scroll किया तो flag set करो
            mainChart.timeScale().subscribeVisibleLogicalRangeChange(() => {
                if (!_chartUpdating) userScrolled = true;
            });
        }
        initChart();
        let _chartUpdating = false; // chart programmatically update हो रहा है?

        // Double-click पर auto-follow फिर से ON करो
        document.getElementById('chart').addEventListener('dblclick', resetChartFollow);

        // 2. FETCH DATA FROM SERVER
        async function loadReplayData() {
            const sym = document.getElementById('sim-symbol').value;
            const dt = document.getElementById('sim-date').value;
            if(!dt) { alert("Please select a date first."); return; }

            document.getElementById('loading-overlay').style.display = 'flex';
            resetReplay(); // Purana clear karo

            try {
                const response = await fetch(`/api/market-replay-data/?symbol=${sym}&date=${dt}`);
                const data = await response.json();
                
                if(!data.success) {
                    alert("Error: " + data.error);
                    document.getElementById('loading-overlay').style.display = 'none';
                    return;
                }

                replayData = data;
                document.getElementById('timeline-slider').max = data.timeline.length - 1;
                document.getElementById('timeline-slider').disabled = false;
                
                // Chart Data को वेरिएबल में सेव करें, लेकिन चार्ट को खाली रखें
                // Bug 7 Fix: allCandlesData हमेशा reset करें चाहे candles हों या न हों
                rawCandlesData = [];
                allCandlesData = [];
                if(data.candles && data.candles.length > 0) {
                    rawCandlesData = data.candles.map(c => {
                        let d = new Date(c.time);
                        let tStr = d.toLocaleTimeString('en-GB', { hour12: false, timeZone: 'Asia/Kolkata' });
                        return {
                            time: d.getTime() / 1000 + 19800, // UTC → IST
                            open: c.open, high: c.high, low: c.low, close: c.close,
                            timeStr: tStr
                        };
                    }).sort((a,b) => a.time - b.time);
                }
                userScrolled = false; // नया data load — auto-follow ON
                rebuildCandles(); // interval के हिसाब से aggregate करो
                setTimeout(() => mainChart.timeScale().fitContent(), 100);

                document.getElementById('loading-overlay').style.display = 'none';
                renderFrame(0); // Pehla frame render karo
                
            } catch (error) {
                alert("Network error: " + error);
                document.getElementById('loading-overlay').style.display = 'none';
            }
        }

        // views.py और trade_logic.py जैसा सटीक लॉजिक
        function getEffectiveLevels(srRow, symbol) {
            if (!srRow) return { r: 0, s: 0 };

            let step = (symbol.includes('BANKNIFTY') || symbol.includes('SENSEX')) ? 100 : 50;
            
            // Resistance (R) Logic
            let resStatus = (srRow.resistance_status || "").toUpperCase();
            let resBase = parseFloat(srRow.resistance_strike) || 0;
            let mRes = resStatus.match(/(?:WTB|WTT)\s+(\d+)/);
            let resTarget = mRes ? parseFloat(mRes[1]) : resBase;

            let effRes = resBase + step; // Default logic
            if (resStatus.includes("SHIFTED WTT")) effRes = resBase + step;
            else if (resStatus.includes("SHIFTED WTB")) effRes = resBase + step;
            else if (resStatus.includes("WTT")) effRes = resTarget - step;
            else if (resStatus.includes("WTB")) effRes = resTarget + step;
            // Bug 6 Fix: STRONG case Python जैसा जोड़ा
            else if (resStatus.includes("STRONG")) effRes = resBase + step;

            // Support (S) Logic
            let supStatus = (srRow.supprt_status || "").toUpperCase();
            let supBase = parseFloat(srRow.supprt_strike) || 0;
            let mSup = supStatus.match(/(?:WTB|WTT)\s+(\d+)/);
            let supTarget = mSup ? parseFloat(mSup[1]) : supBase;

            let effSup = supBase - step; // Default logic
            if (supStatus.includes("SHIFTED WTT")) effSup = supBase - step;
            else if (supStatus.includes("SHIFTED WTB")) effSup = supBase - step;
            else if (supStatus.includes("WTT")) effSup = supTarget - step;
            else if (supStatus.includes("WTB")) effSup = supTarget + step;
            // Bug 6 Fix: STRONG case Python जैसा जोड़ा
            else if (supStatus.includes("STRONG")) effSup = supBase - step;

            return { r: effRes, s: effSup };
        }
        // 3. RENDER FRAME (Tick by Tick)
        // चार्ट लाइनों को ट्रैक करने के लिए ग्लोबल वेरिएबल (Script के टॉप पर रखें)
        let activePriceLines = []; 

        function renderFrame(index) {
            // Bug 3 Fix: togglePlay() से restart होने की जगह cleanly stop करें
            if(!replayData || index >= replayData.timeline.length) {
                if(isPlaying) {
                    clearInterval(playInterval);
                    isPlaying = false;
                    const btn = document.getElementById('btn-play');
                    btn.innerHTML = '▶';
                    btn.style.background = 'var(--accent-green)';
                }
                return;
            }
            
            const timeStr = replayData.timeline[index];
            const dataPoint = replayData.timeline_data[timeStr]; // नया डेटा स्ट्रक्चर

            // 1. टेबल और स्टेट्स 
            document.getElementById('stat-time').innerText = timeStr;
            document.getElementById('stat-spot').innerText = dataPoint.oc.spot.toFixed(2);
            document.getElementById('timeline-slider').value = index;
            document.getElementById('timeline-lbl').innerText = `Tick ${index+1} / ${replayData.timeline.length}`;

            if(dataPoint.sr) {
                document.getElementById('sr-res-val').innerText = dataPoint.sr.resistance_strike || "—";
                document.getElementById('sr-res-stat').innerText = dataPoint.sr.resistance_status || "—";
                document.getElementById('sr-sup-val').innerText = dataPoint.sr.supprt_strike || "—";
                document.getElementById('sr-sup-stat').innerText = dataPoint.sr.supprt_status || "—";
            }

            renderOptionChainTable(dataPoint.oc.chain, dataPoint.oc.spot);

            // 2. रिवर्सल लाइनें (जो पायथन ने भेजी हैं)
            activePriceLines.forEach(line => candleSeries.removePriceLine(line));
            activePriceLines = [];

            if (dataPoint.lines) {
                dataPoint.lines.forEach(rev => {
                    const line = candleSeries.createPriceLine({
                        price: rev.price,
                        color: rev.color,
                        lineWidth: rev.width,
                        lineStyle: LightweightCharts.LineStyle.Solid,
                        axisLabelVisible: true,
                        title: rev.label,
                    });
                    activePriceLines.push(line);
                });
            }

            // 3. कैंडल अपडेट — aggregated candles में से visible दिखाओ
            let visibleCandles = allCandlesData.filter(c => c.timeStr <= timeStr);
            if (visibleCandles.length > 0) {
                candleSeries.setData(visibleCandles);
                showLastCandle();
            }

            timelineIndex = index;
        }
        // 4. DRAW OPTION CHAIN TABLE (With ±15 Strikes & Color Coding)
        function renderOptionChainTable(chainData, spot) {
            // 1. सबसे करीबी स्ट्राइक ढूँढें
            let closestIdx = 0;
            let minDiff = Infinity;
            chainData.forEach((r, i) => {
                let diff = Math.abs(r.Strike_Price - spot);
                if(diff < minDiff) { minDiff = diff; closestIdx = i; }
            });

            // 2. ±15 स्ट्राइक काटें (Slice)
            let startIdx = Math.max(0, closestIdx - 15);
            let endIdx = Math.min(chainData.length, closestIdx + 16);
            let displayData = chainData.slice(startIdx, endIdx);

            // 3. कलर कोडिंग/रैंकिंग लॉजिक (टॉप 1=Green, 2=Red, 3=Yellow)
            function applyRanking(data, metricField, classField) {
                let ranked = [...data].sort((a, b) => (b[metricField] || 0) - (a[metricField] || 0));
                for(let idx = 0; idx < Math.min(3, ranked.length); idx++) {
                    let row = ranked[idx];
                    let val = row[metricField] || 0;
                    if(idx === 0 && val > 0) row[classField] = 'bg-green';
                    else if(idx === 1) {
                        if(val >= 75) row[classField] = 'bg-red';
                        else if(val >= 65) row[classField] = 'bg-yellow';
                    }
                    else if(idx === 2) {
                        let val2nd = ranked[1][metricField] || 0;
                        if(val2nd >= 75 && val >= 65) row[classField] = 'bg-yellow';
                    }
                }
            }

            // पुराने कलर साफ़ करें
            displayData.forEach(r => { 
                r.CE_OI_class = ''; r.PE_OI_class = ''; 
                r.CE_Vol_class = ''; r.PE_Vol_class = ''; 
                r.CE_COI_class = ''; r.PE_COI_class = ''; 
            });

            // कॉलम पर रैंकिंग लागू करें
            applyRanking(displayData, 'CE_OI_percent', 'CE_OI_class');
            applyRanking(displayData, 'PE_OI_percent', 'PE_OI_class');
            applyRanking(displayData, 'CE_Volume_percent', 'CE_Vol_class');
            applyRanking(displayData, 'PE_Volume_percent', 'PE_Vol_class');
            applyRanking(displayData, 'CE_COI_percent', 'CE_COI_class');
            applyRanking(displayData, 'PE_COI_percent', 'PE_COI_class');

            // 4. HTML टेबल बनाना शुरू करें
            let html = `<table>
                <thead>
                    <tr>
                        <th colspan="4" style="background:#004d40;">RESISTANCE (CE)</th>
                        <th rowspan="2" style="background:#000066;">STRIKE</th>
                        <th colspan="4" style="background:#b71c1c;">SUPPORT (PE)</th>
                    </tr>
                    <tr>
                        <th>CHG OI</th><th>OI</th><th>VOL</th><th>REVERSL</th>
                        <th>REVERSL</th><th>VOL</th><th>OI</th><th>CHG OI</th>
                    </tr>
                </thead>
                <tbody>`;
                
            let spotDividerDrawn = false;

            displayData.forEach(r => {
                // लाल वाली स्पॉट डिवाइडर लाइन खींचें
                if (!spotDividerDrawn && r.Strike_Price > spot) {
                    html += `<tr class="spot-line-row">
                                <td colspan="4" style="border-top:2px solid red; padding:0;"></td>
                                <td style="background:var(--accent-yellow); color:#000; font-weight:bold; border:2px solid red; font-size:14px;">${spot.toFixed(2)}</td>
                                <td colspan="4" style="border-top:2px solid red; padding:0;"></td>
                             </tr>`;
                    spotDividerDrawn = true;
                }

                // CHG OI के टेक्स्ट का कलर (Plus=Green, Minus=Red)
                let ceCoiColor = (r.CE_COI || 0) >= 0 ? 'color:var(--accent-green)' : 'color:var(--accent-red)';
                let peCoiColor = (r.PE_COI || 0) >= 0 ? 'color:var(--accent-green)' : 'color:var(--accent-red)';

                html += `<tr>
                    <td class="${r.CE_COI_class}">
                        <div style="${ceCoiColor}; font-weight:bold;">${r.CE_COI || '-'}</div>
                        <div class="pct-text">(${r.CE_COI_percent || 0}%)</div>
                    </td>
                    <td class="${r.CE_OI_class}">
                        <div>${r.CE_OI || '-'}</div>
                        <div class="pct-text">(${r.CE_OI_percent || 0}%)</div>
                    </td>
                    <td class="${r.CE_Vol_class}">
                        <div>${r.CE_Volume || '-'}</div>
                        <div class="pct-text">(${r.CE_Volume_percent || 0}%)</div>
                    </td>
                    <td>${r.Reversl_Ce || 'Breakout'}</td>

                    <td style="font-weight:bold; background:#000066; font-size:13px; color:#fff;">${r.Strike_Price}</td>

                    <td>${r.Reversl_Pe || 'Breakdown'}</td>
                    <td class="${r.PE_Vol_class}">
                        <div>${r.PE_Volume || '-'}</div>
                        <div class="pct-text">(${r.PE_Volume_percent || 0}%)</div>
                    </td>
                    <td class="${r.PE_OI_class}">
                        <div>${r.PE_OI || '-'}</div>
                        <div class="pct-text">(${r.PE_OI_percent || 0}%)</div>
                    </td>
                    <td class="${r.PE_COI_class}">
                        <div style="${peCoiColor}; font-weight:bold;">${r.PE_COI || '-'}</div>
                        <div class="pct-text">(${r.PE_COI_percent || 0}%)</div>
                    </td>
                </tr>`;
            });
            html += `</tbody></table>`;
            document.getElementById('oc-table-div').innerHTML = html;
        }

       


        // 6. PLAYER CONTROLS
        function togglePlay() {
            const btn = document.getElementById('btn-play');
            if(isPlaying) {
                clearInterval(playInterval);
                isPlaying = false;
                btn.innerHTML = '▶';
                btn.style.background = 'var(--accent-green)';
            } else {
                if(!replayData) return;
                isPlaying = true;
                btn.innerHTML = '⏸';
                btn.style.background = 'var(--accent-yellow)';
                let speed = parseInt(document.getElementById('sim-speed').value);
                playInterval = setInterval(() => {
                    renderFrame(timelineIndex + 1);
                }, speed);
            }
        }

        // 7. TIMELINE HOVER TOOLTIP (माउस ले जाने पर टाइम दिखाना)
        const timelineSlider = document.getElementById('timeline-slider');
        const sliderTooltip = document.getElementById('slider-tooltip');

        timelineSlider.addEventListener('mousemove', function(e) {
            if (!replayData || !replayData.timeline) return;
            
            const rect = timelineSlider.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            const clampedPercent = Math.max(0, Math.min(1, percent));
            
            const maxIndex = parseInt(timelineSlider.max);
            const hoverIndex = Math.round(clampedPercent * maxIndex);
            
            const hoverTime = replayData.timeline[hoverIndex];
            if (hoverTime) {
                sliderTooltip.innerText = hoverTime;
                sliderTooltip.style.display = 'block';

                // Bug 8 Fix: tooltip को slider की left boundary से relative calculate करें
                // ताकि right edge पर overflow न हो
                const sliderContainerRect = timelineSlider.parentElement.getBoundingClientRect();
                const rawLeft = e.clientX - sliderContainerRect.left;
                const tooltipHalfWidth = sliderTooltip.offsetWidth / 2;
                const maxLeft = sliderContainerRect.width - tooltipHalfWidth;
                const minLeft = tooltipHalfWidth;
                const clampedLeft = Math.max(minLeft, Math.min(maxLeft, rawLeft));
                sliderTooltip.style.left = `${clampedLeft}px`;
            }
        });

        // जब माउस स्लाइडर से हटे तो टूलटिप छुपा दें
        timelineSlider.addEventListener('mouseleave', function() {
            sliderTooltip.style.display = 'none';
        });
        
        function stepForward() { if(isPlaying) togglePlay(); renderFrame(timelineIndex + 1); }
        function stepBackward() { if(isPlaying) togglePlay(); renderFrame(Math.max(0, timelineIndex - 1)); }
        function seekTimeline(val) { if(isPlaying) togglePlay(); renderFrame(parseInt(val)); }
        function changeSpeed() { if(isPlaying) { togglePlay(); togglePlay(); } }

        function resetReplay() {
            if(isPlaying) togglePlay();
            timelineIndex = 0;
            replayData = null;

            // Bug 4 Fix: पुरानी candles और price lines chart से हटाएं
            allCandlesData = [];
            if(candleSeries) candleSeries.setData([]);
            activePriceLines.forEach(line => { try { candleSeries.removePriceLine(line); } catch(e) {} });
            activePriceLines = [];

            document.getElementById('timeline-slider').value = 0;
            document.getElementById('timeline-slider').disabled = true;
            document.getElementById('timeline-lbl').innerText = 'IDLE';
            document.getElementById('oc-table-div').innerHTML = '';
            document.getElementById('stat-spot').innerText = '—';
            document.getElementById('stat-time').innerText = '—';
            document.getElementById('sr-res-val').innerText = '—';
            document.getElementById('sr-res-stat').innerText = '—';
            document.getElementById('sr-sup-val').innerText = '—';
            document.getElementById('sr-sup-stat').innerText = '—';
        }

    </script>
</body>
</html>
