<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied — 403</title>
    <style>
        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background-color: #0f1115;
            color: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .error-container {
            text-align: center;
            background: #181b21;
            padding: 40px 50px;
            border-radius: 12px;
            border: 1px solid #1e2230;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .icon {
            font-size: 5rem;
            margin-bottom: 10px;
            animation: shake 0.5s ease-in-out;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
        }
        h2 {
            font-size: 24px;
            color: #ef4444; /* Red color */
            margin-bottom: 15px;
        }
        p {
            color: #909399;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 25px;
        }
        .btn-back {
            background: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
            text-decoration: none;
            padding: 12px 24px;
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s ease;
            display: inline-block;
        }
        .btn-back:hover {
            background: #3b82f6;
            color: #fff;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="error-container">
        <div class="icon">🚫</div>
        <h2>Access Denied</h2>
        <p>
            आपके पास इस page को देखने की अनुमति नहीं है।<br>
            यह page सिर्फ Admin (Superuser) के लिए है।
        </p>
        <a href="{% url 'dashboard' %}" class="btn-back">← Dashboard पर वापस जाएं</a>
    </div>

</body>
</html>
